version: '3.8'

services:
  devcollab-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devcollab-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ConnectionStrings__DefaultConnection=Host=devcollab-db;Port=5432;Database=DevCollabDb;Username=postgres;Password=${DEVCOLLAB_DB_PASSWORD:-ChangeMe_DbPassword}
      - Jwt__Key=${DEVCOLLAB_JWT_KEY:-ChangeMe_JwtKey_AtLeast32Chars_Long123}
      - Email__Username=${DEVCOLLAB_EMAIL_USERNAME:-ChangeMe_EmailUser}
      - Email__Password=${DEVCOLLAB_EMAIL_PASSWORD:-ChangeMe_EmailPassword}
      - Minio__Endpoint=devcollab-minio:9000
      - Minio__AccessKey=${DEVCOLLAB_MINIO_ACCESS_KEY:-ChangeMe_MinioAccessKey}
      - Minio__SecretKey=${DEVCOLLAB_MINIO_SECRET_KEY:-ChangeMe_MinioSecretKey}
    depends_on:
      - devcollab-db
      - devcollab-minio
    networks:
      - devcollab-network

  devcollab-db:
    image: postgres:15-alpine
    container_name: devcollab-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DEVCOLLAB_DB_PASSWORD:-ChangeMe_DbPassword}
      - POSTGRES_DB=DevCollabDb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - devcollab-network

  devcollab-minio:
    image: minio/minio:latest
    container_name: devcollab-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${DEVCOLLAB_MINIO_ACCESS_KEY:-ChangeMe_MinioAccessKey}
      - MINIO_ROOT_PASSWORD=${DEVCOLLAB_MINIO_SECRET_KEY:-ChangeMe_MinioSecretKey}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - devcollab-network

networks:
  devcollab-network:
    driver: bridge

volumes:
  pgdata:
  miniodata:
